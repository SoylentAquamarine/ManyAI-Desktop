<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Electron</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src https: http://localhost:*"
    />
    <!-- Apply theme before React renders to prevent flash of default colors -->
    <script>
      try {
        var t = localStorage.getItem('manyai_theme')
        if (t) document.documentElement.setAttribute('data-theme', t)
      } catch(e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- Apply zoom before React mounts so #root is already the right size -->
    <script>
      try {
        var z = parseInt(localStorage.getItem('manyai_zoom') || '100', 10)
        if (!isNaN(z) && z !== 100) {
          var f = z / 100
          var r = document.getElementById('root')
          r.style.transform = 'scale(' + f + ')'
          r.style.transformOrigin = 'top left'
          r.style.width = (100 / f) + '%'
          r.style.height = (100 / f) + 'vh'
        }
      } catch(e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
